# Market-specific settings
markets:
  kospi:
    exchange: "KRX"
    suffix: ".KS"
    currency: "KRW"
    trading_hours: "09:00-15:30"
    timezone: "Asia/Seoul"

  nasdaq:
    exchange: "NASDAQ"
    suffix: ""
    currency: "USD"
    trading_hours: "09:30-16:00"
    timezone: "America/New_York"

# Sector rotation signals
rotation:
  momentum_window: 20  # days
  rebalance_lookback: 60  # days
  top_sectors: 3  # Number of sectors to overweight
  bottom_sectors: 3  # Number of sectors to underweight
